[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "pysemtools"
version = "0.1.0"
requires-python = ">= 3.10"
dependencies = [
    "numpy",
    "scipy",
    "pymech",
    "tqdm",
    "mpi4py",
    "pympler",
    "memory_profiler",
    "h5py",
    "rtree",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pysemtools[torch]",
]
dev = [
    "pre-commit",
]
torch = [
    "torch",
    "torchvision",
    "torchaudio"
]


[project.scripts]
pysemtools_index-files = "pysemtools.cli.index_files:main"
pysemtools_visnek = "pysemtools.cli.visnek:main"
pysemtools_extract_subdomain = "pysemtools.cli.extract_subdomain:main"
